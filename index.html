<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="مِرصاد — منصة إخبارية متخصصة في أخبار الجريمة والحرب والشؤون الأمنية">
<title>مِرصاد | أخبار الجريمة والحرب</title>
<!-- Adsterra Social Bar -->
<script src="https://pl29077058.profitablecpmratenetwork.com/17/57/9f/17579ffe0ff5055b26e318f3ce838eb5.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0b; --bg2:#111114; --bg3:#18181d;
  --red:#e5251a; --red2:#ff3b2f;
  --text:#f0f0f0; --text2:#c8c8c8; --muted:#777;
  --border:rgba(255,255,255,0.07);
  --card:#13131a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:200;background:rgba(10,10,11,.97);backdrop-filter:blur(16px);border-bottom:2px solid var(--red);}
.hdr{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:12px;padding:0 16px;height:56px;}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0;}
.logo-hex{width:34px;height:34px;background:var(--red);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-size:15px;animation:hexPulse 2.5s infinite;}
@keyframes hexPulse{0%,100%{box-shadow:0 0 0 0 rgba(229,37,26,.5)}50%{box-shadow:0 0 0 8px rgba(229,37,26,0)}}
.logo-name{font-family:'Tajawal',sans-serif;font-weight:900;font-size:22px;letter-spacing:-1px;}
.logo-name em{color:var(--red);font-style:normal;}

/* TICKER */
.ticker{flex:1;overflow:hidden;background:rgba(229,37,26,.06);border:1px solid rgba(229,37,26,.15);border-radius:4px;height:30px;position:relative;min-width:0;}
.ticker-tag{position:absolute;right:0;top:0;bottom:0;background:var(--red);padding:0 10px;display:flex;align-items:center;font-size:10px;font-weight:800;letter-spacing:1.5px;z-index:2;white-space:nowrap;}
.ticker-inner{overflow:hidden;height:100%;padding-right:62px;}
.ticker-run{display:flex;align-items:center;height:100%;animation:tickRun 40s linear infinite;white-space:nowrap;}
.ticker-run span{font-size:11.5px;color:var(--muted);margin-left:44px;}
.ticker-run span::before{content:'● ';color:var(--red);font-size:8px;}
@keyframes tickRun{from{transform:translateX(0)}to{transform:translateX(55%)}}

.live{display:flex;align-items:center;gap:4px;background:rgba(229,37,26,.1);border:1px solid rgba(229,37,26,.25);padding:4px 11px;border-radius:20px;font-size:10px;font-weight:800;color:var(--red);flex-shrink:0;letter-spacing:.5px;}
.live-dot{width:6px;height:6px;background:var(--red);border-radius:50%;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.lang-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 9px;border-radius:7px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;outline:none;flex-shrink:0;}

/* ── CATS NAV ── */
.cats{background:var(--bg2);border-bottom:1px solid var(--border);}
.cats-inner{max-width:1280px;margin:0 auto;display:flex;gap:4px;padding:9px 16px;overflow-x:auto;scrollbar-width:none;}
.cats-inner::-webkit-scrollbar{display:none;}
.cat{display:flex;align-items:center;gap:5px;padding:6px 15px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:.18s;white-space:nowrap;flex-shrink:0;}
.cat:hover{color:var(--text);border-color:rgba(255,255,255,.18);}
.cat.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 18px rgba(229,37,26,.3);}

/* ── MAIN WRAP ── */
.wrap{max-width:1280px;margin:0 auto;padding:20px 16px 48px;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:18px;}
.sec-title{font-family:'Tajawal',sans-serif;font-weight:900;font-size:18px;}
.sec-line{flex:1;height:1px;background:var(--border);min-width:16px;}
.sec-count{background:var(--bg3);border:1px solid var(--border);padding:2px 9px;border-radius:20px;font-size:10px;color:var(--muted);}
.srch{position:relative;}
.srch input{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:6px 32px 6px 10px;border-radius:7px;font-family:'Cairo',sans-serif;font-size:12px;width:200px;transition:.2s;outline:none;}
.srch input:focus{border-color:rgba(229,37,26,.4);width:240px;}
.srch input::placeholder{color:var(--muted);}
.srch-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none;}
.ref-btn{background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:6px 13px;border-radius:7px;font-family:'Cairo',sans-serif;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:.2s;}
.ref-btn:hover{color:var(--text);}
.spin{display:inline-block;}
.spinning .spin{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════
   LAYOUT ZONES
══════════════════════════════ */

/* ZONE A — HERO (1 big + 2 side stacked) */
.zone-hero{display:grid;grid-template-columns:2fr 1fr;gap:3px;margin-bottom:3px;border-radius:12px;overflow:hidden;}
@media(max-width:640px){.zone-hero{grid-template-columns:1fr;}}

.hero-main{position:relative;cursor:pointer;overflow:hidden;min-height:380px;background:var(--card);}
.hero-main img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.hero-main:hover img{transform:scale(1.03);}
.hero-main .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.93) 0%,rgba(0,0,0,.3) 55%,transparent 100%);}
.hero-main .body{position:absolute;bottom:0;left:0;right:0;padding:22px 20px;}
.hero-main .cat-tag{display:inline-block;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;margin-bottom:9px;letter-spacing:.5px;}
.hero-main h2{font-family:'Tajawal',sans-serif;font-weight:900;font-size:20px;line-height:1.5;margin-bottom:10px;}
.hero-main .meta{display:flex;align-items:center;gap:8px;font-size:11px;color:rgba(255,255,255,.55);}
.hero-main .src{color:var(--red);font-weight:700;}
.no-img-hero{width:100%;height:100%;min-height:380px;background:linear-gradient(135deg,#1a1a22,#0f0f14);display:flex;align-items:center;justify-content:center;font-size:56px;opacity:.25;}

.hero-side-col{display:flex;flex-direction:column;gap:3px;}
.hero-side{position:relative;cursor:pointer;overflow:hidden;flex:1;background:var(--card);min-height:188px;}
.hero-side img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .35s;}
.hero-side:hover img{transform:scale(1.04);}
.hero-side .overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.2) 60%,transparent 100%);}
.hero-side .body{position:absolute;bottom:0;left:0;right:0;padding:14px 14px;}
.hero-side .cat-tag{display:inline-block;background:rgba(229,37,26,.85);color:#fff;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;margin-bottom:6px;}
.hero-side h3{font-family:'Tajawal',sans-serif;font-weight:800;font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-side .meta{font-size:10px;color:rgba(255,255,255,.5);margin-top:5px;}

/* ZONE B — ROW LIST (thumbnail left + text right) */
.zone-b{margin:3px 0;}
.row-list{display:flex;flex-direction:column;gap:2px;}
.row-card{display:flex;gap:0;background:var(--card);cursor:pointer;overflow:hidden;transition:.18s;border-radius:0;}
.row-card:first-child{border-radius:10px 10px 0 0;}
.row-card:last-child{border-radius:0 0 10px 10px;}
.row-card:only-child{border-radius:10px;}
.row-card:hover{background:#1a1a22;}
.row-card-img{width:120px;height:82px;object-fit:cover;flex-shrink:0;display:block;}
.row-card-nimg{width:120px;height:82px;background:linear-gradient(135deg,var(--bg3),#1a1a22);display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.3;flex-shrink:0;}
.row-card-body{padding:10px 14px;display:flex;flex-direction:column;justify-content:center;gap:5px;flex:1;min-width:0;}
.row-card-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.5px;width:fit-content;}
.row-card-title{font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.row-card-meta{font-size:10px;color:var(--muted);display:flex;gap:8px;}
.row-src{color:var(--red);font-weight:600;}

/* ZONE C — 3-col grid */
.zone-c{margin-top:3px;}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;}
@media(max-width:768px){.grid3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:480px){.grid3{grid-template-columns:1fr;}}

.g3-card{background:var(--card);cursor:pointer;overflow:hidden;border-radius:0;transition:.18s;}
.grid3 .g3-card:first-child{border-radius:10px 0 0 0;}
.grid3 .g3-card:nth-child(3){border-radius:0 10px 0 0;}
.grid3 .g3-card:last-child{border-radius:0 0 10px 10px;}
.g3-card:hover{background:#1a1a22;}
.g3-img{width:100%;height:150px;object-fit:cover;display:block;transition:transform .3s;}
.g3-card:hover .g3-img{transform:scale(1.03);}
.g3-nimg{width:100%;height:150px;background:linear-gradient(135deg,var(--bg3),#1a1a22);display:flex;align-items:center;justify-content:center;font-size:30px;opacity:.25;}
.g3-body{padding:12px 13px;}
.g3-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-bottom:7px;letter-spacing:.5px;}
.g3-title{font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px;}
.g3-meta{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--muted);}
.g3-src{color:var(--red);font-weight:600;}

/* ZONE D — Wide banner card */
.zone-d{margin-top:3px;}
.wide-card{background:var(--card);cursor:pointer;overflow:hidden;border-radius:10px;display:flex;min-height:130px;transition:.18s;}
.wide-card:hover{background:#1a1a22;}
.wide-img{width:260px;object-fit:cover;display:block;flex-shrink:0;transition:transform .3s;}
.wide-card:hover .wide-img{transform:scale(1.02);}
.wide-nimg{width:260px;background:linear-gradient(135deg,var(--bg3),#1a1a22);display:flex;align-items:center;justify-content:center;font-size:36px;opacity:.25;flex-shrink:0;}
.wide-body{padding:18px 20px;display:flex;flex-direction:column;justify-content:center;gap:8px;}
.wide-tag{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.5px;width:fit-content;}
.wide-title{font-family:'Tajawal',sans-serif;font-weight:900;font-size:16px;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.wide-desc{font-size:12px;color:var(--muted);line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.wide-meta{display:flex;gap:9px;font-size:10px;color:var(--muted);}
.wide-src{color:var(--red);font-weight:700;}
@media(max-width:560px){.wide-card{flex-direction:column;}.wide-img,.wide-nimg{width:100%;height:160px;}}

/* SECTION DIVIDER */
.sdiv{display:flex;align-items:center;gap:10px;margin:22px 0 14px;}
.sdiv-bar{width:4px;height:22px;background:var(--red);border-radius:2px;flex-shrink:0;}
.sdiv-title{font-family:'Tajawal',sans-serif;font-weight:900;font-size:16px;}
.sdiv-line{flex:1;height:1px;background:var(--border);}

/* AD SLOT */
.ad-slot{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;margin:18px 0;position:relative;min-height:80px;}
.ad-slot::before{content:'إعلان';position:absolute;top:6px;right:10px;font-size:9px;color:var(--muted);letter-spacing:1px;}

/* BADGE COLORS */
.b-crime{background:rgba(229,37,26,.85);color:#fff;}
.b-war{background:rgba(239,68,68,.8);color:#fff;}
.b-military{background:rgba(107,114,128,.9);color:#fff;}
.b-podcast{background:rgba(139,92,246,.85);color:#fff;}
.b-general{background:rgba(59,130,246,.8);color:#fff;}
.b-all{background:rgba(20,184,166,.8);color:#fff;}

/* SKELETON */
.skel-hero{border-radius:12px;overflow:hidden;display:grid;grid-template-columns:2fr 1fr;gap:3px;margin-bottom:18px;}
.skel-block{background:linear-gradient(90deg,var(--bg3) 25%,#1e1e26 50%,var(--bg3) 75%);background-size:200% 100%;animation:shim 1.5s infinite;}
@keyframes shim{to{background-position:-200% 0}}

/* READER */
.reader-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);z-index:400;flex-direction:column;}
.reader-ov.open{display:flex;}
.reader-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:9px 14px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.reader-close{width:34px;height:34px;border-radius:50%;background:rgba(229,37,26,.12);border:1px solid rgba(229,37,26,.25);color:var(--red);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;}
.reader-close:hover{background:var(--red);color:#fff;}
.reader-title{flex:1;font-family:'Tajawal',sans-serif;font-weight:700;font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.reader-ext{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:7px;font-size:11px;text-decoration:none;flex-shrink:0;transition:.2s;}
.reader-ext:hover{color:var(--text);}
.reader-wrap{flex:1;position:relative;}
.reader-frame{width:100%;height:100%;border:none;background:#fff;}
.reader-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:12px;}
.reader-spinner{width:38px;height:38px;border:3px solid var(--bg3);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
.reader-loading p{font-size:12px;color:var(--muted);}

/* TOAST */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1c1c24;border:1px solid rgba(229,37,26,.35);color:var(--text);padding:10px 18px;border-radius:9px;font-size:12px;z-index:600;opacity:0;transition:.3s;pointer-events:none;max-width:88vw;text-align:center;}
.toast.show{opacity:1;}

footer{border-top:1px solid var(--border);padding:20px 16px;text-align:center;color:var(--muted);font-size:11px;margin-top:10px;}
footer strong{color:var(--text);}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--red);border-radius:3px;}

@media(max-width:600px){
  .ticker{display:none;}
  .hdr{gap:8px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr">
    <a class="logo" href="#">
      <div class="logo-hex">🎯</div>
      <span class="logo-name">مِر<em>صاد</em></span>
    </a>
    <div class="ticker">
      <div class="ticker-tag">عاجل</div>
      <div class="ticker-inner">
        <div class="ticker-run" id="tickerRun"><span>جارٍ تحميل الأخبار...</span></div>
      </div>
    </div>
    <div class="live"><div class="live-dot"></div>مباشر</div>
    <select class="lang-sel" id="langSel" onchange="onLang(this.value)">
      <option value="ar">🌍 عربي</option>
      <option value="fr">🇫🇷 FR</option>
      <option value="en">🇬🇧 EN</option>
    </select>
  </div>
</header>

<!-- CATS -->
<div class="cats">
  <div class="cats-inner">
    <button class="cat on" data-cat="all"      onclick="onCat(this)">📡 الكل</button>
    <button class="cat"    data-cat="crime"    onclick="onCat(this)">🔍 جرائم ومحاكمات</button>
    <button class="cat"    data-cat="war"      onclick="onCat(this)">💥 حروب وصراعات</button>
    <button class="cat"    data-cat="military" onclick="onCat(this)">🪖 آليات عسكرية</button>
    <button class="cat"    data-cat="podcast"  onclick="onCat(this)">🎙️ قصص جريمة</button>
    <button class="cat"    data-cat="general"  onclick="onCat(this)">🌐 أخبار عامة</button>
  </div>
</div>

<div class="wrap">
  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="sec-title" id="secTitle">آخر الأخبار</span>
    <div class="sec-line"></div>
    <span class="sec-count" id="secCount">0 خبر</span>
    <div class="srch">
      <span class="srch-ico">🔎</span>
      <input id="srchInput" placeholder="ابحث في الأخبار..." oninput="onSearch()">
    </div>
    <button class="ref-btn" id="refBtn" onclick="load()"><span class="spin">↻</span> تحديث</button>
  </div>

  <!-- CONTENT -->
  <div id="content"></div>
</div>

<footer>
  <strong>مِرصاد</strong> — منصة إخبارية متخصصة في الجريمة والحرب والشؤون الأمنية &nbsp;·&nbsp;
  <span>مدعوم بـ GNews · NewsAPI · CurrentsAPI وغيرها</span>
</footer>

<!-- READER MODAL -->
<div class="reader-ov" id="reader">
  <div class="reader-bar">
    <button class="reader-close" onclick="closeReader()">✕</button>
    <div class="reader-title" id="rTitle"></div>
    <a class="reader-ext" id="rLink" target="_blank" rel="noopener">↗ فتح</a>
  </div>
  <div class="reader-wrap">
    <div class="reader-loading" id="rLoading">
      <div class="reader-spinner"></div>
      <p>جارٍ تحميل الخبر...</p>
    </div>
    <iframe class="reader-frame" id="rFrame"
      sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
      onload="rLoaded()" onerror="rError()"></iframe>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/news';

const CATS = {
  all:     {ar:'الكل',           icon:'📡',badge:'b-all',
    q:{ar:'جريمة حرب|قتل صراع',fr:'crime guerre|meurtre conflit',en:'crime war|murder conflict'}},
  crime:   {ar:'جرائم ومحاكمات',icon:'🔍',badge:'b-crime',
    q:{ar:'جريمة محاكمة|قتل اعتقال',fr:'crime tribunal|meurtre arrestation',en:'crime trial|murder arrest'}},
  war:     {ar:'حروب وصراعات',  icon:'💥',badge:'b-war',
    q:{ar:'حرب صراع|قصف هجوم',fr:'guerre conflit|bombardement attaque',en:'war conflict|airstrike attack'}},
  military:{ar:'آليات عسكرية',  icon:'🪖',badge:'b-military',
    q:{ar:'آليات عسكرية أسلحة|جيش قوات',fr:'armée militaire|armes soldats',en:'military weapons|army forces'}},
  podcast: {ar:'قصص جريمة',     icon:'🎙️',badge:'b-podcast',
    q:{ar:'جريمة حقيقية قصة|مجرم مطلوب',fr:'true crime histoire|criminel recherché',en:'true crime story|serial killer'}},
  general: {ar:'أخبار عامة',    icon:'🌐',badge:'b-general',
    q:{ar:'أخبار عاجلة|حوادث كوارث',fr:'actualités urgentes|incidents',en:'breaking news|incidents'}},
};
const LANGS = {ar:'عربي',fr:'Français',en:'English'};

let arts=[], cat='all', lang='ar';
const S={};

load();

async function load(){
  setLoading(true);
  const q = CATS[cat].q[lang];
  try{
    const r = await fetch(`${API}?q=${encodeURIComponent(q)}&lang=${lang}`);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    if(d.error) throw new Error(d.error);
    arts = d.articles||[];
    paint(arts);
    ticker();
  }catch(e){
    document.getElementById('content').innerHTML = empty(`تعذّر التحميل: ${e.message}`,'⚠️');
    showToast(e.message);
  }finally{ setLoading(false); }
}

/* ─── PAINT ─── */
function paint(list){
  const q = document.getElementById('srchInput').value.toLowerCase();
  const f = q ? list.filter(a=>(a.title||'').toLowerCase().includes(q)||(a.description||'').toLowerCase().includes(q)) : list;
  document.getElementById('secCount').textContent = `${f.length} خبر`;
  document.getElementById('secTitle').textContent = CATS[cat].ar;
  if(!f.length){ document.getElementById('content').innerHTML=empty('لا توجد نتائج','🔍'); return; }

  const badge = CATS[cat].badge;
  const icon  = CATS[cat].icon;
  const label = CATS[cat].ar;

  let html = '';

  // ── ZONE A: Hero ──
  if(f.length >= 1){
    const main = f[0];
    const s1   = f[1]||null;
    const s2   = f[2]||null;
    html += `<div class="zone-hero">`;
    html += heroMain(main, badge, label);
    html += `<div class="hero-side-col">`;
    if(s1) html += heroSide(s1, badge, label);
    if(s2) html += heroSide(s2, badge, label);
    html += `</div></div>`;
  }

  // ── AD after hero ──
  html += adSlot();

  // ── ZONE B: Row list (items 3–8) ──
  const rowItems = f.slice(3,9);
  if(rowItems.length){
    html += sdiv(icon+' '+label+' — أحدث الأخبار');
    html += `<div class="zone-b"><div class="row-list">`;
    rowItems.forEach(a => { html += rowCard(a, badge, label); });
    html += `</div></div>`;
  }

  // ── AD between zones ──
  html += adSlot();

  // ── ZONE C: 3-col grid (items 9–17) ──
  const gridItems = f.slice(9,18);
  if(gridItems.length){
    html += sdiv('📰 المزيد من الأخبار');
    html += `<div class="zone-c"><div class="grid3">`;
    gridItems.forEach(a => { html += g3Card(a, badge, label); });
    html += `</div></div>`;
  }

  // ── AD ──
  html += adSlot();

  // ── ZONE D: Wide cards (items 18+) ──
  const wideItems = f.slice(18);
  if(wideItems.length){
    html += sdiv('🔎 أخبار إضافية');
    wideItems.forEach((a,i) => {
      html += wideCard(a, badge, label);
      if((i+1)%4===0) html += adSlot();
    });
  }

  document.getElementById('content').innerHTML = html;
  execAdScripts();
}

/* ─── CARD BUILDERS ─── */
function heroMain(a,badge,label){
  const k=key(a);
  const img = a.image
    ? `<img src="${x(a.image)}" alt="" loading="eager" onerror="this.outerHTML='<div class=no-img-hero>📰</div>'">`
    : `<div class="no-img-hero">📰</div>`;
  return `<div class="hero-main" onclick="openR('${k}')">
    ${img}
    <div class="overlay"></div>
    <div class="body">
      <span class="cat-tag ${badge}">${label}</span>
      <h2>${x(a.title||'')}</h2>
      <div class="meta"><span class="src">${x(a.source?.name||'')}</span><span>🕐 ${ago(a.publishedAt)}</span></div>
    </div>
  </div>`;
}

function heroSide(a,badge,label){
  const k=key(a);
  const img = a.image
    ? `<img src="${x(a.image)}" alt="" loading="lazy" onerror="this.outerHTML=''">`
    : '';
  return `<div class="hero-side" onclick="openR('${k}')">
    ${img}
    <div class="overlay"></div>
    <div class="body">
      <span class="cat-tag ${badge}">${label}</span>
      <h3>${x(a.title||'')}</h3>
      <div class="meta">${x(a.source?.name||'')} · ${ago(a.publishedAt)}</div>
    </div>
  </div>`;
}

function rowCard(a,badge,label){
  const k=key(a);
  const img = a.image
    ? `<img class="row-card-img" src="${x(a.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=row-card-nimg>📰</div>'">`
    : `<div class="row-card-nimg">📰</div>`;
  return `<div class="row-card" onclick="openR('${k}')">
    ${img}
    <div class="row-card-body">
      <span class="row-card-tag ${badge}">${label}</span>
      <div class="row-card-title">${x(a.title||'')}</div>
      <div class="row-card-meta"><span class="row-src">${x(a.source?.name||'')}</span><span>🕐 ${ago(a.publishedAt)}</span></div>
    </div>
  </div>`;
}

function g3Card(a,badge,label){
  const k=key(a);
  const img = a.image
    ? `<img class="g3-img" src="${x(a.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=g3-nimg>📰</div>'">`
    : `<div class="g3-nimg">📰</div>`;
  return `<div class="g3-card" onclick="openR('${k}')">
    ${img}
    <div class="g3-body">
      <span class="g3-tag ${badge}">${label}</span>
      <div class="g3-title">${x(a.title||'')}</div>
      <div class="g3-meta"><span class="g3-src">${x(a.source?.name||'')}</span><span>🕐 ${ago(a.publishedAt)}</span></div>
    </div>
  </div>`;
}

function wideCard(a,badge,label){
  const k=key(a);
  const img = a.image
    ? `<img class="wide-img" src="${x(a.image)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=wide-nimg>📰</div>'">`
    : `<div class="wide-nimg">📰</div>`;
  return `<div class="wide-card" onclick="openR('${k}')">
    ${img}
    <div class="wide-body">
      <span class="wide-tag ${badge}">${label}</span>
      <div class="wide-title">${x(a.title||'')}</div>
      <div class="wide-desc">${x(a.description||'')}</div>
      <div class="wide-meta"><span class="wide-src">${x(a.source?.name||'')}</span><span>🕐 ${ago(a.publishedAt)}</span></div>
    </div>
  </div>`;
}

function sdiv(t){
  return `<div class="sdiv"><div class="sdiv-bar"></div><div class="sdiv-title">${t}</div><div class="sdiv-line"></div></div>`;
}

function adSlot(){
  return `<div class="ad-slot">
    <div id="container-bc0c78487cf2df696114bf93daa4c89b-${Math.random().toString(36).slice(2,8)}">
      <script data-adsterra async data-cfasync="false" src="https://pl29077059.profitablecpmratenetwork.com/bc0c78487cf2df696114bf93daa4c89b/invoke.js"><\/script>
    </div>
  </div>`;
}

function execAdScripts(){
  document.querySelectorAll('script[data-adsterra]').forEach(old=>{
    const ns=document.createElement('script');
    ns.src=old.src; ns.async=true; ns.setAttribute('data-cfasync','false');
    old.replaceWith(ns);
  });
}

function empty(msg,ico){
  return `<div style="text-align:center;padding:70px 20px">
    <div style="font-size:48px;opacity:.3;margin-bottom:14px">${ico}</div>
    <h3 style="font-size:16px;margin-bottom:8px">${msg}</h3>
    <p style="font-size:12px;color:var(--muted)">حاول مرة أخرى أو اختر فئة مختلفة</p>
  </div>`;
}

/* ─── READER ─── */
function openR(k){
  const a=S[k]; if(!a) return;
  document.getElementById('rTitle').textContent=a.title||'';
  document.getElementById('rLink').href=a.url||'#';
  document.getElementById('rLoading').style.display='flex';
  document.getElementById('rFrame').src='';
  document.getElementById('reader').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>{ document.getElementById('rFrame').src=a.url||''; },80);
}
function rLoaded(){ document.getElementById('rLoading').style.display='none'; }
function rError(){
  document.getElementById('rLoading').innerHTML=`
    <div style="text-align:center;padding:20px">
      <div style="font-size:38px;margin-bottom:10px">🔒</div>
      <p style="color:var(--muted);font-size:12px;margin-bottom:12px">هذا الموقع لا يسمح بالعرض المدمج</p>
      <a href="${document.getElementById('rLink').href}" target="_blank"
        style="background:var(--red);color:#fff;padding:9px 18px;border-radius:8px;text-decoration:none;font-size:13px">
        فتح في تبويب جديد ↗
      </a>
    </div>`;
}
function closeReader(){
  document.getElementById('reader').classList.remove('open');
  document.getElementById('rFrame').src='';
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeReader(); });
document.getElementById('reader').addEventListener('click',e=>{ if(e.target===document.getElementById('reader')) closeReader(); });

/* ─── CONTROLS ─── */
function onCat(btn){
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); cat=btn.dataset.cat; load();
}
function onLang(l){
  lang=l; document.documentElement.lang=l;
  document.documentElement.dir=l==='ar'?'rtl':'ltr'; load();
}
function onSearch(){ paint(arts); }

/* ─── TICKER ─── */
function ticker(){
  const h=arts.slice(0,10).map(a=>a.title||'').filter(Boolean);
  if(!h.length) return;
  document.getElementById('tickerRun').innerHTML=h.map(t=>`<span>${x(t)}</span>`).join('');
}

/* ─── LOADING ─── */
function setLoading(on){
  document.getElementById('refBtn').classList.toggle('spinning',on);
  if(on) document.getElementById('content').innerHTML=`
    <div class="skel-hero">
      <div class="skel-block" style="height:380px;border-radius:10px 0 0 10px"></div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <div class="skel-block" style="flex:1;border-radius:0"></div>
        <div class="skel-block" style="flex:1;border-radius:0 10px 10px 0"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:3px;margin-top:3px">
      ${Array(5).fill(`<div class="skel-block" style="height:82px;border-radius:5px"></div>`).join('')}
    </div>`;
}

/* ─── TOAST ─── */
function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3500);
}

/* ─── HELPERS ─── */
function key(a){ const k=Math.random().toString(36).slice(2,10); S[k]=a; return k; }
function x(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ago(d){
  if(!d) return '';
  const s=(Date.now()-new Date(d))/1000;
  if(s<60) return 'الآن';
  if(s<3600) return `${Math.floor(s/60)} د`;
  if(s<86400) return `${Math.floor(s/3600)} س`;
  return `${Math.floor(s/86400)} ي`;
}
